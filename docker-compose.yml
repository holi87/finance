services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: budget_tracker
      POSTGRES_USER: budget
      POSTGRES_PASSWORD: budget
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U budget -d budget_tracker']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://localhost:3001/api/v1/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://localhost/ || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_started
    ports:
      - '8080:80'
    volumes:
      - ./infra/docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro

volumes:
  postgres-data:
